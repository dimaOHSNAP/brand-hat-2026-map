<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Brand Hat 2026 - All Locations</title><link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/><script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script><style>*{box-sizing:border-box;}html,body,#map{width:100%;height:100%;margin:0;padding:0;}</style></head><body><div id="map"></div><script>var coords=[];var map=L.map("map");L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:"OpenStreetMap contributors",maxZoom:18}).addTo(map);var icon=L.icon({iconUrl:"https://lh3.googleusercontent.com/d/1l18aokVNGDiV-G_VN3Foals6sY877a3N",iconSize:[60,37],iconAnchor:[30,37]});var b=[];coords.forEach(function(c){L.marker([c[0],c[1]],{icon:icon}).addTo(map);b.push([c[0],c[1]]);});if(b.length>0){map.fitBounds(b,{padding:[30,30]});}else{map.setView([20,0],2);}</script></body></html>
